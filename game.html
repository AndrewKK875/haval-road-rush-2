<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>HAVAL Road Rush 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; touch-action: none; }
    canvas { display: block; }

    #ui {
      position: fixed; inset: 0;
      pointer-events: none;
      font-family: 'Arial Black', Arial, sans-serif;
    }

    /* Score */
    #score {
      position: absolute;
      top: 16px; left: 50%; transform: translateX(-50%);
      color: #fff;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    /* Brand */
    #brand {
      position: absolute;
      top: 16px; left: 16px;
      color: #FF6B00;
      font-size: 11px;
      letter-spacing: 4px;
      font-weight: 700;
    }

    /* Stage badge */
    #stage-badge {
      position: absolute;
      bottom: 16px; right: 16px;
      color: rgba(255,255,255,0.25);
      font-size: 9px;
      letter-spacing: 2px;
    }

    /* Back link */
    #back {
      position: absolute;
      top: 16px; right: 16px;
      color: rgba(255,255,255,0.3);
      font-size: 10px;
      letter-spacing: 2px;
      pointer-events: all;
      text-decoration: none;
      cursor: pointer;
    }
    #back:hover { color: #FF6B00; }

    /* Loading */
    #loading {
      position: fixed; inset: 0;
      background: #0a0a14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      transition: opacity 0.5s;
    }
    #loading .logo { color: #FF6B00; font-family: 'Arial Black', Arial; font-size: 11px; letter-spacing: 6px; }
    #loading .title { color: #fff; font-family: 'Arial Black', Arial; font-size: 28px; letter-spacing: 4px; font-weight: 900; }
    #load-bar-bg { width: 160px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 24px; }
    #load-bar { height: 100%; width: 0%; background: #FF6B00; border-radius: 2px; transition: width 0.3s; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<div id="loading">
  <div class="logo">HAVAL</div>
  <div class="title">ROAD RUSH 2</div>
  <div id="load-bar-bg"><div id="load-bar"></div></div>
</div>

<div id="ui">
  <div id="brand">HAVAL</div>
  <div id="score">0</div>
  <a id="back" href="index.html">← МЕНЮ</a>
  <div id="stage-badge">ЭТАП 2 — СЦЕНА</div>
</div>

<script type="module">
import * as THREE from 'three';

// ── Прогресс загрузки ─────────────────────────────────────────────────────────
const loadBar = document.getElementById('load-bar');
function setProgress(pct) { loadBar.style.width = pct + '%'; }
function hideLoading() {
  setProgress(100);
  setTimeout(() => {
    const el = document.getElementById('loading');
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 500);
  }, 300);
}

setProgress(10);

// ── Renderer ──────────────────────────────────────────────────────────────────
const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

const renderer = new THREE.WebGLRenderer({
  antialias: !isMobile,
  powerPreference: 'high-performance',
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.shadowMap.autoUpdate = false;
document.body.appendChild(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // Небо

setProgress(30);

// ── Ортографическая камера (как в Crossy Road) ────────────────────────────────
const VIEW_SIZE = 8;
let aspect = window.innerWidth / window.innerHeight;

const camera = new THREE.OrthographicCamera(
  -VIEW_SIZE * aspect,  // left
   VIEW_SIZE * aspect,  // right
   VIEW_SIZE,           // top
  -VIEW_SIZE,           // bottom
  0.1, 200
);

// Изометрическая позиция: сверху-сзади-немного сбоку
camera.position.set(0, 15, 15);
camera.lookAt(0, 0, 0);

setProgress(50);

// ── Освещение ─────────────────────────────────────────────────────────────────
// Основной солнечный свет
const sun = new THREE.DirectionalLight(0xFFF5D0, 2.0);
sun.position.set(8, 20, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(512, 512);
sun.shadow.camera.left   = -20;
sun.shadow.camera.right  =  20;
sun.shadow.camera.top    =  20;
sun.shadow.camera.bottom = -20;
sun.shadow.camera.near   = 0.1;
sun.shadow.camera.far    = 80;
scene.add(sun);

// Небо + земля (мягкий рассеянный свет)
scene.add(new THREE.HemisphereLight(0x87CEEB, 0x8B7355, 0.8));

setProgress(70);

// ── Пустая сцена — только временный пол для проверки камеры ──────────────────
// (будет заменён в этапе 3 на настоящие ряды)
const floorGeo = new THREE.PlaneGeometry(40, 80);
const floorMat = new THREE.MeshLambertMaterial({ color: 0x6EC655 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Горизонтальные линии-разделители (подсказка будущих рядов)
const lineMat = new THREE.LineBasicMaterial({ color: 0x5AB044, transparent: true, opacity: 0.3 });
for (let z = -20; z <= 20; z += 1.5) {
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-20, 0.01, z),
    new THREE.Vector3( 20, 0.01, z),
  ]);
  scene.add(new THREE.Line(geo, lineMat));
}

setProgress(90);
renderer.shadowMap.needsUpdate = true;

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  aspect = window.innerWidth / window.innerHeight;
  camera.left  = -VIEW_SIZE * aspect;
  camera.right =  VIEW_SIZE * aspect;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Game loop ─────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

animate();
hideLoading();
</script>
</body>
</html>
